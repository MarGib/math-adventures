name: Apply DB migrations

# Triggers:
#  - Auto: kazdy push do main ktory rusza pliki w supabase/migrations/
#  - Manual: zakladka Actions -> Run workflow (dla force-runa)
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:

permissions:
  contents: read

# Tylko jeden migration job naraz — zeby DDL sie nie scieral
concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Prepare connection URL
        env:
          RAW_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${RAW_URL:-}" ]; then
              echo "::error::SUPABASE_DB_URL secret nie jest ustawiony."
              echo "Settings -> Secrets and variables -> Actions -> New repo secret"
              echo "Wartosc: Supabase Dashboard -> Project Settings -> Database -> Connection String -> URI"
              exit 1
          fi
          # Supabase Postgres wymaga SSL. Dodaj sslmode=require jezeli go nie ma.
          DB_URL="$RAW_URL"
          if ! echo "$DB_URL" | grep -q 'sslmode='; then
              if echo "$DB_URL" | grep -q '?'; then
                  DB_URL="${DB_URL}&sslmode=require"
              else
                  DB_URL="${DB_URL}?sslmode=require"
              fi
          fi
          # Maskuj hasło w logach
          MASKED=$(echo "$DB_URL" | sed -E 's|://([^:]+):[^@]+@|://\1:****@|')
          echo "DB URL (masked): $MASKED"
          # Wystaw do nastepnego stepu przez GITHUB_ENV (multiline-safe)
          {
              echo "DB_URL<<__EOL__"
              echo "$DB_URL"
              echo "__EOL__"
          } >> "$GITHUB_ENV"

      - name: Test connection
        run: |
          set -euo pipefail
          echo "→ select version() ..."
          psql "$DB_URL" -v ON_ERROR_STOP=1 -t -A -c "select version();"
          echo "→ current database / user ..."
          psql "$DB_URL" -v ON_ERROR_STOP=1 -t -A -c "select current_database(), current_user;"

      - name: Apply migrations in order
        run: |
          set -euo pipefail

          echo "=== Krok 1: tabela meta _migrations ==="
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "
            create table if not exists public._migrations (
                name text primary key,
                applied_at timestamptz not null default now(),
                checksum text
            );
          "

          echo "=== Krok 2: lista plikow ==="
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
              echo "Brak plikow migracji."
              exit 0
          fi
          for file in $(printf '%s\n' "${files[@]}" | sort); do
              echo "  - $(basename "$file") ($(wc -l < "$file") linii)"
          done

          echo ""
          echo "=== Krok 3: wgrywanie ==="
          for file in $(printf '%s\n' "${files[@]}" | sort); do
              name=$(basename "$file")
              checksum=$(sha256sum "$file" | cut -c1-16)

              applied=$(psql "$DB_URL" -v ON_ERROR_STOP=1 -t -A \
                  -c "select count(*) from public._migrations where name = '\$\$$name\$\$';" 2>/dev/null || echo "0")
              # ^^ dolar-quoted string zeby uniknac problemow z apostrofami w nazwach
              if [ "$applied" = "1" ]; then
                  echo "✓ $name już zastosowana — pomijam"
                  continue
              fi

              echo ""
              echo "──────────────────────────────────────────────────"
              echo "→ Wgrywam $name (sha=$checksum)"
              echo "──────────────────────────────────────────────────"
              # Uruchom z echo zapytan, zeby w razie bledu bylo widac ktora linia padla
              if ! psql "$DB_URL" -v ON_ERROR_STOP=1 --echo-errors -f "$file"; then
                  echo "::error::Migracja $name nie powiodla sie. Zobacz log powyzej."
                  exit 1
              fi
              psql "$DB_URL" -v ON_ERROR_STOP=1 \
                  -c "insert into public._migrations(name, checksum) values ('$name', '$checksum');"
              echo "✓ $name zastosowana"
          done

          echo ""
          echo "=== Stan koncowy ==="
          psql "$DB_URL" -v ON_ERROR_STOP=1 \
              -c "select name, applied_at, checksum from public._migrations order by name;"
